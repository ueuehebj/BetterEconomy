# ========================================
# BetterEconomy Configuration
# ========================================

# ========================================
# Database Configuration
# ========================================
database:
  # Storage type: SQLITE or MYSQL
  type: SQLITE

  sqlite:
    # SQLite database file path (relative to plugins/BetterEconomy)
    file: "economy.db"

  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "economy"
    username: "root"
    password: "password"
    useSSL: false
    
    # HikariCP Connection Pool Configuration
    pool:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    
    # Table prefix for multi-plugin database sharing
    table-prefix: "eco_"

# ========================================
# Cross-Server Economy Sync Configuration
# (Only effective in MySQL mode)
# ========================================
cross-server-sync:
  enabled: false
  
  # Server identifier - each server must have a unique server-id
  server-id: "server-1"
  
  # Sync method:
  # DATABASE_POLLING - Periodically poll database for other servers' changes (simple, no extra dependencies)
  # REDIS - Use Redis Pub/Sub for real-time notifications (requires Redis installation, most real-time)
  sync-method: DATABASE_POLLING
  
  # Polling interval (ticks), only used in DATABASE_POLLING mode
  polling-interval-ticks: 100

  redis:
    host: "127.0.0.1"
    port: 6379
    password: ""
    channel: "economy-sync"

  # Offline revenue conflict resolution strategy:
  # LAST_WRITE_WINS - Use the last written data as authoritative (by timestamp, simple but may lose intermediate changes)
  # DELTA_MERGE - Record each change as a "delta" rather than absolute value,
  #              cross-server sync applies delta sum instead of overwriting balance,
  #              ensures no overlap when multiple servers award offline players
  conflict-resolution: DELTA_MERGE

  # Optimistic locking using version field to prevent race conditions
  optimistic-locking: true

# ========================================
# Economy System Configuration
# ========================================
economy:
  # Currency precision (decimal places)
  decimal-places: 2

  # Allow negative balance
  allow-negative-balance: false

  # Starting balance for new players
  starting-balance:
    enabled: true
    amount: 1000.0

  # Balance cap
  balance-cap:
    enabled: false
    amount: 1000000.0

  # Pay (transfer) configuration
  pay:
    # Minimum transfer amount
    minimum-amount: 1.0
    # Allow transferring to self
    allow-self-pay: false
    # Allow transferring to offline players
    allow-offline-target: true

  # Currency display format
  format:
    # Enable number abbreviation (1000 -> 1K, 1000000 -> 1M)
    abbreviate: false
    
    # Currency symbol
    # Built-in symbols: DOLLAR($) EURO(€) POUND(£) YEN(¥) WON(₩) RUBLE(₽) CENT(¢) CUSTOM
    currency-symbol: DOLLAR
    custom-symbol: "coin"
    
    # Symbol position: PREFIX ($100) or SUFFIX (100$)
    symbol-position: SUFFIX
    
    # Thousands separator
    thousands-separator: ","

  # Balance top (baltop) configuration
  baltop:
    entries-per-page: 10
    cache-seconds: 60
    # Excluded players (e.g., admin test accounts)
    excluded-players: []

  # Transaction history configuration
  history:
    entries-per-page: 10
    # Retention days (0 = permanent)
    retention-days: 90

# ========================================
# Vault Integration
# ========================================
vault:
  enabled: true
  # Currency name displayed in Vault
  currency-name-singular: "Coin"
  currency-name-plural: "Coins"

# ========================================
# PlaceholderAPI Integration
# ========================================
placeholderapi:
  enabled: true

# ========================================
# Debug Mode
# ========================================
debug: false
